<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Bienvenid@ al HaydeFest 2026!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0b0b16; /* Color oscuro que combina con los fuegos artificiales de fondo */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: sans-serif;
        }
        .contenedor-imagen {
            width: 100%;
            max-width: 600px; /* Tamaño óptimo para pantallas de celular */
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            width: 100%;
            height: auto;
            border-radius: 20px; /* Bordes suaves y estéticos */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); /* Sombra elegante */
            animation: aparecer 1s ease-out;
        }
        @keyframes aparecer {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="contenedor-imagen">
        <!-- Vincula la imagen que subiste al repositorio -->
        <img src="viaje-haydefest.png" alt="Check In Exitoso - HaydeFest 2026">
    </div>

</body>
</html>
